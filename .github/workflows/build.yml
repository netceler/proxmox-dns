name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create releases

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so vcs.revision and vcs.time are embedded

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test -race -v ./...

      - name: Build
        run: |
          go build \
            -ldflags "-X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o proxmox-dns .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxmox-dns
          path: proxmox-dns
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: proxmox-dns
